services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: properti-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - PHP_UPLOAD_MAX_FILESIZE=50M
      - PHP_POST_MAX_SIZE=100M
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro


    networks:
      - properti-net

  webserver:
    image: nginx:alpine
    container_name: properti-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - properti-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: properti-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: properti_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: properti_user
      MYSQL_PASSWORD: properti_pass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - properti-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: properti-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
      PMA_CONFIGURATION_STORAGE: 'false'
    networks:
      - properti-net
    depends_on:
      - db

networks:
  properti-net:
    driver: bridge

volumes:
  dbdata:
